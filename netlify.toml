# ============================================
# GYMCALC.IO — Netlify Configuration
# ============================================

[build]
  publish = "."
  functions = "netlify/functions"

# Redirects — maps /api/* to serverless functions
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

# Clean URLs — /pages/roi-calculator works without .html
[[redirects]]
  from = "/calculators"
  to = "/pages/calculators.html"
  status = 200

[[redirects]]
  from = "/roi"
  to = "/pages/roi-calculator.html"
  status = 200

[[redirects]]
  from = "/plan"
  to = "/pages/equipment-recommender.html"
  status = 200

[[redirects]]
  from = "/phase"
  to = "/pages/phase-builder.html"
  status = 200

[[redirects]]
  from = "/dumbbells"
  to = "/pages/dumbbells-quiz.html"
  status = 200

[[redirects]]
  from = "/cardio"
  to = "/pages/cardio-quiz.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Headers — security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables needed (set in Netlify dashboard):
# ANTHROPIC_API_KEY=sk-ant-...
# MAILCHIMP_API_KEY=your-key-usX
# MAILCHIMP_LIST_ID=your-list-id
